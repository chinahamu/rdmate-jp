services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: rdmate-jp:local
    ports:
      - "3001:3000"
    env_file:
      - .env.docker.example
    environment:
      NODE_ENV: production
      RDMATE_USAGE_MODE: institution
      RDMATE_ENFORCE_HTTPS: "false"
      DATABASE_URL: file:/data/rdmate.db
      HOSTNAME: 0.0.0.0
    volumes:
      - app-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    environment:
      POSTGRES_DB: rdmate
      POSTGRES_USER: rdmate
      POSTGRES_PASSWORD: rdmate
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rdmate -d rdmate"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  app-data:
  postgres-data:
