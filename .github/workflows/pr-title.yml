name: PR Title

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  validate-pr-title:
    name: Validate Conventional Commit PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            refactor
            perf
            build
            ci
            chore
            revert
          scopes: |
            dmp
            datasets
            metadata
            storage
            export
            access-control
            audit
            data-protection
            docker
            docs
            release
            deps
            ci
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            PRタイトルのsubjectは小文字から始めてください。
            例: feat: add dataset export preview
