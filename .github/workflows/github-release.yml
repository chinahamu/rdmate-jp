name: GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, such as v0.1.0'
        required: true
        type: string
      prerelease:
        description: 'Mark release as prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: github-release-${{ github.ref }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Build artifacts and publish release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Create release bundle
        run: |
          mkdir -p dist/release
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='dist' \
            --exclude='coverage' \
            --exclude='playwright-report' \
            --exclude='test-results' \
            --exclude='prisma/*.db' \
            --exclude='prisma/*.db-journal' \
            -czf "dist/release/rdmate-jp-${RELEASE_TAG}.tar.gz" .

      - name: Create checksums
        run: |
          cd dist/release
          sha256sum "rdmate-jp-${RELEASE_TAG}.tar.gz" > SHA256SUMS

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
            type=raw,value=latest,enable=${{ !contains(env.RELEASE_TAG, '-') && inputs.prerelease != true }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release notes
        run: |
          pnpm release:notes --tag "${RELEASE_TAG}" --image "${IMAGE_NAME}:${RELEASE_TAG#v}" --output RELEASE_NOTES.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: RDMate JP ${{ env.RELEASE_TAG }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ inputs.prerelease || contains(env.RELEASE_TAG, '-') }}
          generate_release_notes: true
          files: |
            dist/release/rdmate-jp-${{ env.RELEASE_TAG }}.tar.gz
            dist/release/SHA256SUMS
