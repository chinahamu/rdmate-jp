name: Bug Report
description: RDMate JPの不具合を報告します
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        不具合報告ありがとうございます。再現手順、期待結果、実際の結果をできるだけ具体的に記載してください。
  - type: input
    id: affected-area
    attributes:
      label: 影響範囲
      description: 影響する画面、API、CLI、ドキュメントなどを記載してください。
      placeholder: 例：/datasets、/api/datasets/import、pnpm rdmate export
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 再現手順
      description: 不具合を再現するための操作手順を番号付きで記載してください。
      placeholder: |
        1. pnpm dev を実行する
        2. /datasets を開く
        3. CSVインポートを実行する
        4. エラーが表示される
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: 期待した動作
      description: 本来どう動くべきかを記載してください。
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: 実際の動作
      description: 実際に起きたこと、エラーメッセージ、スクリーンショットの概要を記載してください。
    validations:
      required: true
  - type: dropdown
    id: usage-mode
    attributes:
      label: 利用モード
      options:
        - local
        - team
        - institution
        - unknown
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 実行環境
      description: OS、Node.js、pnpm、ブラウザ、Docker利用有無などを記載してください。
      placeholder: |
        OS: Windows 11 / macOS / Linux
        Node.js: 22.x
        pnpm: 11.x
        Browser: Chrome / Edge / Firefox
        Docker: yes/no
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: ログ・補足情報
      description: 個人情報や秘密値を除いたログ、スタックトレース、関連Issue/PRがあれば記載してください。
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: 確認事項
      options:
        - label: 最新のmainまたは最新リリースで再現することを確認しました
          required: false
        - label: 個人情報、秘密値、実データ本体を貼り付けていません
          required: true
